<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みっけ夜市ポスター v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100vh; background: #04030C; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

    #poster-outer { transform-origin: top left; flex-shrink: 0; }

    #bleed-wrap {
      width: 860px; height: 1213px;
      padding: 5px;
      background: linear-gradient(170deg, #1A0F2E 0%, #220D35 50%, #1F1030 100%);
      box-sizing: border-box;
      flex-shrink: 0;
    }


    #poster {
      width: 850px; height: 1203px;
      position: relative; overflow: hidden;
      font-family: 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    }
    #poster::after {
      content: ''; position: absolute; inset: 18px;
      border: 1px solid rgba(232,69,44,0.20);
      pointer-events: none; z-index: 60;
    }

    .bg-base {
      position: absolute; inset: 0;
      background: linear-gradient(170deg, #1A0F2E 0%, #220D35 28%, #251238 60%, #1F1030 100%);
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
      background-size: 44px 44px; pointer-events: none;
    }
    .bg-horizon {
      position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
      width: 900px; height: 520px;
      background: radial-gradient(ellipse, rgba(210,55,18,0.15) 0%, rgba(200,80,20,0.07) 42%, transparent 72%);
      pointer-events: none;
    }
    #stars { position: absolute; inset: 0; pointer-events: none; }

    .content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 40px 62px 32px;
      z-index: 10;
    }

    .project-heading {
      font-size: 28px; font-weight: 900;
      letter-spacing: 0.12em;
      color: rgba(232, 69, 44, 0.88);
      margin-bottom: 14px;
      flex-shrink: 0;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 24px;
      flex-shrink: 0;
      background: #ffffff;
      border-radius: 12px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      width: 160px;
      height: auto;
      display: block;
    }

    .catchphrase { margin-bottom: 28px; flex-shrink: 0; text-align: center; }
    .catch {
      display: block;
      font-size: 100px; font-weight: 900;
      letter-spacing: -0.02em; line-height: 1.12;
      color: #F5EDD8;
      text-align: center;
    }
    .catch-accent-row {
      display: flex;
      justify-content: center;
    }
    .catch.accent {
      display: inline-block;
      color: #F5EDD8;
      background: rgba(232, 69, 44, 0.38);
      padding: 4px 22px 10px;
      border-radius: 10px;
    }

    .divider {
      display: flex; align-items: center; gap: 14px;
      width: 100%; flex-shrink: 0;
    }
    .divider.top    { margin-bottom: 22px; }
    .divider.bottom { margin-bottom: 14px; }
    .div-line    { flex: 1; height: 1px; background: rgba(245,237,216,0.14); }
    .div-diamond { width: 6px; height: 6px; background: rgba(232,69,44,0.6); transform: rotate(45deg); flex-shrink: 0; }

    .body {
      font-size: 30px; font-weight: 700;
      line-height: 1.90; color: rgba(245,237,216,0.92);
      flex-shrink: 0; width: 100%;
      text-align: center;
    }
    .body p { margin-bottom: 22px; }
    .body p:last-child { margin-bottom: 0; }

    .hi {
      background: rgba(232, 69, 44, 0.26);
      color: #F8EEE0;
      padding: 2px 7px 3px; border-radius: 4px;
      font-weight: 900;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .spacer { flex: 1; min-height: 4px; }

    .bottom-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px; flex-shrink: 0;
    }

    .qr-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px; flex-shrink: 0;
    }
    .qr-box {
      width: 150px; height: 150px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: #ffffff;
      padding: 8px;
    }
    .qr-box img, .qr-box canvas { display: block; width: 130px !important; height: 130px !important; }
    .qr-main-label {
      font-size: 26px; font-weight: 900;
      letter-spacing: 0.10em;
      color: rgba(245,237,216,0.90);
    }
    .qr-url {
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.07em;
      color: rgba(245,237,216,0.45);
    }

    @media print {
      @page { size: A1 portrait; margin: 0; }
      html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body {
        display: block !important;
        padding: 0 !important;
        margin: 0 !important;
        min-height: unset !important;
        background: transparent !important;
        zoom: 2.638;
      }
      #poster-outer {
        transform: none !important;
        margin: 0 !important;
        width: 860px !important;
        height: 1213px !important;
      }
    }
  </style>
</head>

          <p>みっけは、<span class="hi">小中学生が対象の教育プログラム</span>。<br>

  <script>
    (function(){
      var cv=document.getElementById('stars'),W=850,H=1203,SC=3;
      cv.width=W*SC; cv.height=H*SC;
      cv.style.width=W+'px'; cv.style.height=H+'px';
      var ctx=cv.getContext('2d'),seed=42;
      ctx.scale(SC,SC);
      function rand(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646;}
      for(var i=0;i<270;i++){
        var x=rand()*W,y=rand()*H*0.75,big=rand()<0.1;
        var r=big?rand()*1.3+0.9:rand()*0.65+0.15,op=rand()*0.52+0.08;
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle='rgba(245,238,218,'+op+')';ctx.fill();
      }
    })();

    (function(){
      new QRCode(document.getElementById('qr-container'), {
        text: 'https://shiiiiiiiin-oooo.github.io/mikke-lp/',
        width: 300,
        height: 300,
        colorDark: '#1a1829',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M

    (function(){
      var PW=860,PH=1213,outer=document.getElementById('poster-outer');
      function scale(){
        var vw=window.innerWidth-40,vh=window.innerHeight-40,s=Math.min(vw/PW,vh/PH);
        outer.style.transform='scale('+s+')'; outer.style.transformOrigin='top left';
        outer.style.width=(PW*s)+'px'; outer.style.height=(PH*s)+'px';
        outer.style.marginLeft=Math.max(0,(window.innerWidth-PW*s)/2-20)+'px';
        outer.style.marginTop=Math.max(0,(window.innerHeight-PH*s)/2-20)+'px';
      }
      scale(); window.addEventListener('resize',scale);
    window.addEventListener('beforeprint', function() {
      var o = document.getElementById('poster-outer');
      o.style.cssText = 'width:860px;height:1213px;margin:0;transform:none;transform-origin:top left;flex-shrink:0;';
    });
    window.addEventListener('afterprint', function() { scale(); });

    })();
