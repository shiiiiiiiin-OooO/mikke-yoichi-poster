<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミッケ かき氷プロジェクト A1ポスター (4辺ぼかし・最終版)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Yomogi&display=swap" rel="stylesheet">
<style>
    :root {
        --mk-orange: #FF6B00;
        --mk-yellow: #FFCC00;
        --mk-green: #34C759;
        --mk-bg-night: #000F2E; 
        --mk-text-light: #FFFFFF;
    }

    @page {
        size: 594mm 841mm;
        margin: 0;
    }

    body {
        margin: 0;
        padding: 0;
        background-color: #cccccc; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .poster {
        width: 594mm;
        height: 841mm;
        background-color: var(--mk-bg-night);
        background-image: linear-gradient(180deg, var(--mk-bg-night) 0%, #001A4F 60%, rgba(255, 107, 0, 0.1) 100%);
        box-sizing: border-box;
        padding: 40mm; 
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
    }

    .logo {
        position: absolute;
        top: 30mm;
        left: 40mm;
        font-family: 'Yomogi', cursive;
        font-size: 18mm; 
        color: var(--mk-orange);
        font-weight: bold;
        text-shadow: 0 0 10px #FFFFFF;
        z-index: 20;
    }

    .zone-catch {
        flex: 1.2;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
        z-index: 5;
        padding-top: 20mm; 
    }
    .catch-title {
        font-family: 'Yomogi', cursive;
        font-size: 28mm; 
        line-height: 1.3;
        color: var(--mk-orange);
        margin: 0 0 15mm 0;
        text-shadow: 0 0 15px #FFFFFF, 0 0 5px #FFFFFF;
        z-index: 10;
    }
    
    .image-container {
        width: 100%;
        max-height: 220mm;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* ★修正点：4辺の端っこ（5%）だけをうっすら透過させる魔法★ */
    img.kakigori-main {
        width: auto; 
        max-width: 100%;
        height: 100%;
        max-height: 220mm;
        object-fit: cover;
        border-radius: 10px; /* 角自体も少し丸めておく */
        
        /* 左右と上下のグラデーションを掛け合わせて、フチだけを透明にする */
        -webkit-mask-image: 
            linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%),
            linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
        -webkit-mask-composite: source-in;
        mask-composite: intersect;
    }

    .zone-desc {
        flex: 0.9;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(255, 204, 0, 0.05);
        border: 4px dashed var(--mk-orange);
        border-radius: 20px;
        padding: 25mm 30mm; 
        margin: 10mm 0;
        z-index: 4;
    }
    .desc-text {
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 900;
        font-size: 15mm; 
        line-height: 1.5;
        color: var(--mk-text-light); 
        text-align: center;
        margin: 0;
    }
    .highlight {
        color: var(--mk-yellow); 
        border-bottom: 6px solid var(--mk-orange); 
    }

    .zone-info {
        flex: 0.8;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center; 
        border-top: 5px dashed var(--mk-orange);
        padding-top: 20mm;
        color: var(--mk-text-light); 
        z-index: 3;
    }
    .info-details {
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 700;
        font-size: 14mm; 
        line-height: 1.6;
        flex: 1.2; 
    }
    .info-details span {
        display: inline-block;
        background-color: var(--mk-orange);
        color: white;
        padding: 3mm 6mm;
        border-radius: 8px;
        margin-right: 6mm;
        font-size: 12mm;
    }
    
    .cta-area {
        display: flex;
        flex-direction: column;
        align-items: center; 
        flex: 0.8; 
    }
    .cta-text {
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 900;
        font-size: 10mm;
        color: var(--mk-text-light);
        margin-bottom: 8mm; 
    }
    .qr-placeholder {
        width: 70mm; 
        height: 70mm;
        background-color: white;
        border: 5px solid var(--mk-orange); 
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 700;
        font-size: 9mm;
        color: #999;
    }

    @media print {
        body { background-color: transparent; }
        .poster { box-shadow: none; }
    }
</style>
</head>
<body>

<div class="poster">
    <div class="logo">ミッケ夜市プロジェクト</div>
    <div class="zone-catch">
        <h1 class="catch-title">店長は小学生。<br>相棒はAI。</h1>
        <div class="image-container">
            <img src="Gemini_Generated_Image_2nzzx72nzzx72nzz.png" alt="ミッケのかき氷" class="kakigori-main">
        </div>
    </div>
    <div class="zone-desc">
        <p class="desc-text">
            小中学生が<br>
            AIを相棒にして、<br>
            <span class="highlight">ゼロから立ち上げた</span><br>
            かき氷のお店。<br><br>
            メニューも、看板も、<br>
            ぜんぶ自分たちで<br>考えました。<br>
            ぼくらの「本気」、<br>
            食べてみてください！
        </p>
    </div>
    <div class="zone-info">
        <div class="info-details">
            <p><span>場所</span> 土曜夜市会場 〇〇ブース</p>
        </div>
        <div class="cta-area">
            <div class="cta-text">ミッケの裏側はこちら！ ⬇</div>
            <div class="qr-placeholder">QRコード<br>差し替え</div>
        </div>
    </div>
</div>

</body>
</html>
